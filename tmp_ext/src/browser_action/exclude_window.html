<!doctype html>
<meta charset="utf-8">
<style type="text/css">
    *{
        box-sizing: border-box;
    }
	#mainPopup {
		padding: 10px;
		height: 200px;
        width: 100%;
		font-family: Helvetica, Ubuntu, Arial, sans-serif;
	}
    body{
        margin: 0;
    }
	h1 {
		font-size: 2em;
	}
	button{
		background-color: #4CAF50;
		border: none;
		color: white;
		padding: 10px 15px;
		text-align: center;
		text-decoration: none;
		display: inline-block;
		font-size: 16px;
		margin: 4px 2px;
		cursor: pointer;
	}
	#message {
		color: green;
		font-weight: bold;
		text-align: center;
		padding: 8px;
	}
	textarea {
		font-family: monospace;
		font-size: 14px;
	}
	@media (max-width: 600px) {
		#mainPopup {
			width: 100%;
			height: auto;
		}
	}
</style>
<script src="popup_exclude.js"></script>
<div id="mainPopup">
    <h1>Quản lý Ngoại Lệ</h1>
    <textarea id="excludes" style="width: 100%; min-height: 300px"></textarea>
    <center>
		<button id="addCurrent">Thêm Trang Hiện Tại</button>
        <button id="save">Lưu</button>
    </center>
	<p id="message"></p>
</div>
